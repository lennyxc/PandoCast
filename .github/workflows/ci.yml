name: CI

on:
  pull_request:
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore .\PandoCast.slnx

      - name: Build
        run: dotnet build .\PandoCast.slnx --configuration Release --no-restore

      - name: Publish smoke check
        run: |
          dotnet publish .\PandoCast.UI\PandoCast.UI.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            /p:PublishSingleFile=true `
            /p:EnableCompressionInSingleFile=true `
            /p:IncludeNativeLibrariesForSelfExtract=true `
            /p:AssemblyName=PandoCast `
            /p:PublishDir=.\artifacts\ci-publish\