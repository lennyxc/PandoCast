name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Build and release
    runs-on: windows-2025-vs2026

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish app
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"

          if ($tag -notmatch '^v(?<version>\d+\.\d+\.\d+)$') {
            throw "Release tags must match vMAJOR.MINOR.PATCH, for example v1.0.0. Current tag: $tag"
          }

          $version = $Matches.version
          $fileVersion = "$version.0"

          $publishDir = Join-Path $env:GITHUB_WORKSPACE "artifacts\publish"
          $releaseDir = Join-Path $env:GITHUB_WORKSPACE "artifacts\release"

          New-Item -ItemType Directory -Force -Path $publishDir | Out-Null
          New-Item -ItemType Directory -Force -Path $releaseDir | Out-Null

          dotnet publish .\PandoCast.UI\PandoCast.UI.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            /p:PublishSingleFile=true `
            /p:EnableCompressionInSingleFile=true `
            /p:IncludeNativeLibrariesForSelfExtract=true `
            /p:Version=$version `
            /p:FileVersion=$fileVersion `
            /p:AssemblyVersion=$fileVersion `
            /p:InformationalVersion=$tag `
            -o $publishDir

          $publishedExe = Join-Path $publishDir "PandoCast.exe"
          $releaseExe = Join-Path $releaseDir "PandoCast-$tag-win-x64.exe"

          if (!(Test-Path $publishedExe)) {
            Get-ChildItem $publishDir
            throw "Published executable not found: $publishedExe"
          }

          Copy-Item $publishedExe $releaseExe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/release/PandoCast-${{ github.ref_name }}-win-x64.exe
          generate_release_notes: true